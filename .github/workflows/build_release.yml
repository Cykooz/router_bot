name: Build Container Image

on: [ workflow_dispatch ]

jobs:
  build_binary:
    name: Build Binary File - ${{ matrix.platform.docker_platform }}
    strategy:
      matrix:
        platform:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-24.04
            docker_platform: amd64
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-24.04
            docker_platform: arm64

    runs-on: ${{ matrix.platform.runs-on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.platform.target }}
          args: "--locked --release"
          strip: true

      - name: Upload binary file
        uses: actions/upload-artifact@v6
        with:
          name: binary-${{ matrix.platform.docker_platform }}
          path: target/${{ matrix.platform.target }}/release/router_bot

  container_image:
    runs-on: ubuntu-latest
    needs: build_binary
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifact for amd64
        uses: actions/download-artifact@v7
        with:
          name: binary-amd64
          path: docker/amd64/

      - name: Download artifact for arm64
        uses: actions/download-artifact@v7
        with:
          name: binary-arm64
          path: docker/arm64/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/cykooz/router_bot:latest
